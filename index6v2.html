<!DOCTYPE html>
<!-- Estrategia v2: no mobile, SpeechRecognition domina o microfone e a analise acustica acontece apenas em janelas curtas apos resultados finais; no desktop, o fluxo compartilhado original e preservado. -->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrevista com Diarizacao Simples - v6v2</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="style2.css">
</head>
<body>
  <main class="app">
    <h1>Transcricao com 2 Speakers</h1>

    <section class="card controls">
      <div class="buttons calibracao-buttons">
        <button id="btnCalibrarIndividuo1" type="button">Calibrar Individuo 1</button>
        <button id="btnCalibrarIndividuo2" type="button">Calibrar Individuo 2</button>
      </div>
      <p class="orientacao">Para calibracao fale "Meu nome Ã© NOME".</p>
      <p class="orientacao"></p>
      <div class="buttons acao-buttons">
        <button id="btnIniciar" type="button">Iniciar Entrevista</button>
        <button id="btnFinalizar" type="button" disabled>Finalizar Entrevista</button>
      </div>
      <p id="status" class="status">Status: aguardando acao.</p>
    </section>

    <section id="cardResultadoFinal" class="card card-resultado-final">
      <div class="resultado-header">
        <h2>Resultado Final</h2>
        <div class="resultado-acoes">
          <button id="btnEnviar" type="button">Enviar para IA</button>
        </div>
      </div>
      <div id="resultadoGrid" class="resultado-grid">
        <article class="resultado-coluna">
          <h3>Segmentos marcados</h3>
          <div id="resultadoSegmentos" class="resultado"></div>
        </article>
        <article id="colunaTranscricaoFinal" class="resultado-coluna">
          <h3>Transcricao final corrida</h3>
          <div id="transcricaoFinal" class="resultado"></div>
        </article>
      </div>
    </section>

    <section id="cardDebug" class="card card-debug">
      <div class="debug-header">
        <h2>Debug</h2>
        <button id="btnModoDebug" type="button" class="btn-modo">Ativar Modo Debug</button>
      </div>
      <div id="debug" class="debug"></div>
      <div id="promptEditor" class="prompt-editor" hidden>
        <label class="prompt-label" for="campoPromptIA">Prompt da IA</label>
        <p class="prompt-hint">Use {{TRANSCRICAO_FINAL}} e {{SEGMENTOS_MARCADOS}} para inserir os blocos automaticamente.</p>
        <textarea id="campoPromptIA" class="prompt-textarea"></textarea>
        <div class="prompt-actions">
          <button id="btnSalvarPromptIA" type="button" class="btn-modo">Salvar</button>
        </div>
      </div>
    </section>
  </main>

  <script src="script6v2.js" defer></script>
</body>
</html>
